name: dark-editorial
label: Dark Editorial
description: Dark editorial theme with luminous type, bright accents, and dramatic cover-section contrast

fonts:
  google:
    - family: Cormorant Garamond
      weights: [500, 600, 700]
    - family: Noto Sans JP
      weights: [400, 500, 700]
    - family: IBM Plex Mono
      weights: [400, 500]

defaults:
  global:
    lang: "ja"
    fonts:
      sans: "Cormorant Garamond, Noto Sans JP, serif"
      mono: "IBM Plex Mono, monospace"
    colors:
      accent: "#FF6A3D"
      bg_default: "#141519"
      bg_inverse: "#0B0C0F"
      text_primary: "#FFF4E8"
      text_secondary: "#D3C3B1"

  badge:
    enabled: true
    text: "After Hours"
    defaults:
      cover: true
      section: true
      agenda: true
      body: true

  page_number:
    enabled: true
    start: 1
    defaults:
      cover: false
      section: false
      agenda: true
      body: true

  accent_bar:
    defaults:
      cover: "left"
      section: "left"
      agenda: "top"
      body: "left"

  agenda:
    enabled: true
    title: "Night Index"
    eyebrow: "Night Index"

  end:
    enabled: true
    title: "Thank you"
    subtitle: ""

  tokens: {}
  slides: []
