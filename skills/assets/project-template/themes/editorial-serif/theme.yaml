name: editorial-serif
label: Editorial Serif
description: Serif-forward editorial theme with restrained accents and paper-like surfaces

fonts:
  google:
    - family: Cormorant Garamond
      weights: [500, 600, 700]
    - family: Noto Serif JP
      weights: [400, 500, 600, 700]
    - family: IBM Plex Mono
      weights: [400, 500]

defaults:
  global:
    lang: "ja"
    fonts:
      sans: "Cormorant Garamond, Noto Serif JP, serif"
      mono: "IBM Plex Mono, monospace"
    colors:
      accent: "#7A2E3A"
      bg_default: "#F4EFE7"
      bg_inverse: "#221A1A"
      text_primary: "#221A1A"
      text_secondary: "#5B4C4E"

  badge:
    enabled: true
    text: "Private Edition"
    defaults:
      cover: false
      section: true
      agenda: true
      body: true

  page_number:
    enabled: true
    start: 1
    defaults:
      cover: false
      section: false
      agenda: true
      body: true

  accent_bar:
    defaults:
      cover: "left"
      section: "none"
      agenda: "top"
      body: "left"

  agenda:
    enabled: true
    title: "Contents"
    eyebrow: "Contents"

  end:
    enabled: true
    title: "Thank you"
    subtitle: ""

  tokens: {}
  slides: []
